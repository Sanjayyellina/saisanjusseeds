<!-- ==================== DISPATCH ==================== -->
<div id="page-dispatch" class="page">
  <div class="page-header">
    <div class="page-title-wrap">
      <div class="page-eyebrow">Logistics</div>
      <div class="page-title">Dispatch & Receipts</div>
      <div class="page-subtitle">Generate cryptographically signed, tamper-proof receipts</div>
    </div>
    <button class="btn btn-gold" onclick="openModal('dispatch-modal')">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      New Dispatch
    </button>
  </div>
  <div class="panel">
    <table class="data-table"><thead><tr>
      <th>Receipt ID</th><th>Date</th><th>To Party</th><th>Hybrid</th><th>Bags</th><th>Qty (Kg)</th><th>Moisture %</th><th>Amount</th><th>Vehicle</th><th>Verified</th><th></th>
    </tr></thead><tbody id="dispatch-full-tbody"></tbody></table>
  </div>
</div>
