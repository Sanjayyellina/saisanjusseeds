<!-- ============================
     CONFIG PAGE FRAGMENT
     Yellina Seeds Operations Platform
     Include in index.html
     ============================ -->

<!-- ============================================================
     SUPABASE CONFIG BANNER (shown when not configured)
     ============================================================ -->
<div id="config-banner" style="display:none;position:fixed;inset:0;z-index:9999;background:#0F1923;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:20px;padding:40px;width:480px;box-shadow:0 32px 80px rgba(0,0,0,.4);">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:800;color:#0F1923;">Connect Your Database</div>
      <div style="font-size:13px;color:#8A9BAD;margin-top:6px;">Enter your Supabase project credentials to go live</div>
    </div>
    <div style="background:#FFF8EC;border:1px solid #FDEBC8;border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:12px;color:#C8821A;line-height:1.6;">
      <strong>How to get these:</strong><br>
      1. Go to <strong>supabase.com</strong> → your project<br>
      2. Settings → API → copy <strong>Project URL</strong> and <strong>anon public key</strong>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:20px;">
      <div>
        <label style="font-size:11px;font-weight:700;color:#5A6E82;text-transform:uppercase;letter-spacing:.7px;display:block;margin-bottom:5px;">Supabase Project URL</label>
        <input id="cfg-url" style="width:100%;height:40px;padding:0 13px;border:1.5px solid #E4E9F0;border-radius:8px;font-size:13px;font-family:'DM Mono',monospace;outline:none;" placeholder="https://xxxxxxxxxxxx.supabase.co">
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#5A6E82;text-transform:uppercase;letter-spacing:.7px;display:block;margin-bottom:5px;">Anon Public Key</label>
        <input id="cfg-key" style="width:100%;height:40px;padding:0 13px;border:1.5px solid #E4E9F0;border-radius:8px;font-size:13px;font-family:'DM Mono',monospace;outline:none;" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...">
      </div>
    </div>
    <button onclick="saveConfig()" style="width:100%;height:44px;background:#0F1923;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;">Connect & Continue</button>
    <button onclick="useDemoMode()" style="width:100%;height:36px;background:transparent;color:#8A9BAD;border:none;cursor:pointer;font-size:12px;margin-top:8px;font-family:'DM Sans',sans-serif;">Use demo mode (no database)</button>
  </div>
</div>
