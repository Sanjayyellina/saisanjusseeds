<!-- ==================== INTAKE ==================== -->
<div id="page-intake" class="page">
  <div class="page-header">
    <div class="page-title-wrap">
      <div class="page-eyebrow">Logistics</div>
      <div class="page-title">Intake Register</div>
      <div class="page-subtitle">All incoming corn loads — <span id="intake-total-weight" class="fw700 text-gold">0T</span> total</div>
    </div>
    <div class="header-actions">
      <input class="form-input" id="intake-search" style="width:240px;" placeholder="🔍 Search vehicle, hybrid, challan…" oninput="filterTable('intake-search','intake-full-tbody')">
      <button class="btn btn-gold" onclick="openModal('intake-modal')">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        New Intake
      </button>
    </div>
  </div>
  <div class="panel">
    <table class="data-table"><thead><tr>
      <th>#</th><th>Date & Time</th><th>Challan</th><th>Vehicle</th><th>From</th><th>Hybrid</th><th>Lot No</th><th>Qty (T)</th><th>Veh. Wt (Kg)</th><th>Gross Wt (Kg)</th><th>Net Wt (Kg)</th><th>Moisture %</th><th>Bin</th><th>Status</th><th></th>
    </tr></thead><tbody id="intake-full-tbody"></tbody></table>
  </div>
</div>
