<!-- ==================== VERIFY ==================== -->
<div id="page-verify" class="page">
  <div class="page-header">
    <div class="page-title-wrap">
      <div class="page-eyebrow">Security</div>
      <div class="page-title">Verify Receipt Authenticity</div>
      <div class="page-subtitle">Instantly detect if a receipt has been tampered with</div>
    </div>
  </div>
  <div class="verify-card">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:14px 16px;background:var(--amber-bg);border:1px solid var(--amber-bdr);border-radius:var(--radius);">
      <span style="font-size:22px;">🔐</span>
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--ink);">How it works</div>
        <div style="font-size:12px;color:var(--ink-4);">Every receipt has a unique cryptographic hash. Even changing one character (amount, bags, party name) will invalidate it instantly.</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Receipt ID or Hash</label>
      <input class="form-input" id="verify-input" style="font-family:'DM Mono',monospace;height:44px;" placeholder="YDS-2026-001001  or paste full hash string…">
    </div>
    <button class="btn btn-solid mt16" style="width:100%;justify-content:center;height:44px;" onclick="verifyReceipt()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Verify Authenticity
    </button>
    <div id="verify-result"></div>
  </div>
</div>
